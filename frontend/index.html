<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF IA | Resúmenes Inteligentes</title>
    <!-- Tailwind CSS por CDN (Cero instalación) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Tarjeta Principal Minimalista -->
    <main class="bg-white w-full max-w-2xl rounded-2xl shadow-sm border border-gray-100 p-8">
        
        <!-- Encabezado -->
        <header class="text-center mb-8">
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Analizador de PDF con IA</h1>
            <p class="text-sm text-gray-500 mt-2">Sube tu documento y Llama 3.2 hará el resto.</p>
        </header>

        <!-- Zona de subida de archivo -->
        <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center hover:bg-gray-50 transition-colors">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden" onchange="updateFileName()">
            <label for="fileInput" class="cursor-pointer flex flex-col items-center justify-center">
                <svg class="w-10 h-10 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <span id="fileNameDisplay" class="text-sm text-gray-600 font-medium">Haz clic para seleccionar un PDF</span>
            </label>
        </div>

        <!-- Botón de Acción -->
        <button id="uploadBtn" onclick="uploadAndAnalyze()" class="w-full mt-6 bg-black text-white font-medium py-3 px-4 rounded-xl hover:bg-gray-800 transition-all disabled:bg-gray-300 disabled:cursor-not-allowed">
            Generar Resumen
        </button>

        <!-- Estado de Carga (Spinner oculto por defecto) -->
        <div id="loadingState" class="hidden mt-8 text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-black mx-auto"></div>
            <p class="text-sm text-gray-500 mt-3 animate-pulse">La IA está leyendo y procesando el documento...</p>
        </div>

        <!-- Resultado del Resumen (Oculto por defecto) -->
        <div id="resultBox" class="hidden mt-8">
            <h3 class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-3">Resultado Generado:</h3>
            <div class="bg-gray-50 rounded-xl p-5 border border-gray-100">
                <!-- Se usa whitespace-pre-wrap para respetar los saltos de línea de la IA -->
                <p id="summaryText" class="text-gray-700 text-sm leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
        
    </main>

    <!-- Lógica de Conexión (JavaScript Vanilla) -->
    <script>
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const uploadBtn = document.getElementById('uploadBtn');
        const loadingState = document.getElementById('loadingState');
        const resultBox = document.getElementById('resultBox');
        const summaryText = document.getElementById('summaryText');

        // Cambia el texto cuando seleccionás un archivo
        function updateFileName() {
            if (fileInput.files.length > 0) {
                fileNameDisplay.textContent = fileInput.files[0].name;
                fileNameDisplay.classList.add("text-blue-600");
            }
        }

        async function uploadAndAnalyze() {
            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona un PDF primero.");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append("file", file);

            // UI: Ocultar resultado anterior, mostrar loading, deshabilitar botón
            resultBox.classList.add('hidden');
            loadingState.classList.remove('hidden');
            uploadBtn.disabled = true;

            try {
                // Llamada real a tu API en Docker
                const response = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Error al procesar el archivo");
                }

                const data = await response.json();
                
                // UI: Ocultar loading, mostrar resultado
                loadingState.classList.add('hidden');
                resultBox.classList.remove('hidden');
                summaryText.textContent = data.resumen;

            } catch (error) {
                loadingState.classList.add('hidden');
                alert("Ocurrió un error: " + error.message);
            } finally {
                // UI: Restaurar botón
                uploadBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
