version: '3.8'

services:
  # --- SERVICIO 1: La Base de Datos ---
  mongodb:
    image: mongo:latest
    container_name: pdf_mongo
    ports:
      - "27017:27017" # Conecta el puerto de tu compu con el del contenedor
    volumes:
      - mongo_data:/data/db # Guarda los datos en un disco virtual para que no se borren

  # --- SERVICIO 2: El Cerebro (IA) ---
  ollama:
    image: ollama/ollama:latest
    container_name: pdf_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama # Guarda los modelos descargados para no bajarlos cada vez

  # --- SERVICIO 3: Nuestra API (El Recepcionista) ---
  api:
    build: . # Le dice que arme la imagen usando el Dockerfile que creamos recién
    container_name: pdf_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env # Le inyecta las variables de entorno
    depends_on:
      - mongodb
      - ollama # Le avisa que espere a que Mongo y Ollama arranquen primero

# Declaramos los discos virtuales ("volúmenes")
volumes:
  mongo_data:
  ollama_data: